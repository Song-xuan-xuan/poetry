version: "3.8"

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: poetry-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      # Tune WiredTiger cache for 2G server (default would consume too much RAM)
      - MONGO_INITDB_DATABASE=poetrydb
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: ./backend
    container_name: poetry-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - DATABASE_NAME=poetrydb
      - HOST=0.0.0.0
      - PORT=8081

  # Nginx + Vue Frontend
  web:
    build: ./frontend
    container_name: poetry-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mongo_data:
